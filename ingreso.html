<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <!-- CSS propio -->
    <link rel="stylesheet" href="./css/ingreso.css">
</head>
<body>

<div class="contenedorLogin">
    <div class="loginBox">
        <h4 class="texTitulo">Iniciar Sesión</h4>

        <form>
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" placeholder="Ingresa tu correo">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" placeholder="Ingresa tu contraseña">
            </div>

            <div class="d-grid">
                <button class="btn btn-primary">Ingresar</button>
            </div>
        </form>

        <div class="links">
            <a href="#">¿Olvidaste tu contraseña?</a><br>
            <a href="registro/registro.html">Registrarse</a><br>
            <a id="linkHome" href="/index.html">Volver a página principal</a>
        </div>
    </div>
</div>

</body>
</html>
